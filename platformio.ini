[env:esp32-cyd]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed = 460800

monitor_filters = 
    esp32_exception_decoder
    time
    colorize

build_flags = 
    -DCORE_DEBUG_LEVEL=3
    -std=gnu++17
    -Wall
    -Wextra
    -O2
    -D USER_SETUP_LOADED
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_MOSI=13
    -D TFT_MISO=12
    -D TFT_SCLK=14
    -D TFT_RST=-1
    -D TFT_BL=21
    -D TFT_BACKLIGHT_ON=1
    -D ILI9341_DRIVER
    -D LOAD_GLCD
    -D LOAD_FONT2
    -D LOAD_FONT4
    -D LOAD_FONT6
    -D LOAD_FONT7
    -D LOAD_FONT8

lib_deps = 
    bodmer/TFT_eSPI @ ^2.5.0
    bblanchon/ArduinoJson @ ^6.21.0
    adafruit/DHT sensor library @ ^1.4.4
    Adafruit SHT31
    adafruit/Adafruit ADS1X15 @ ^2.4.0
    mikalhart/TinyGPS++ @ ^1.0.3