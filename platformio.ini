[env:esp32-cyd]
platform = espressif32
board = esp32dev
framework = arduino

; ═══════════════════════════════════════════════════════════════
; MONITOR & UPLOAD SETTINGS
; ═══════════════════════════════════════════════════════════════
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_speed = 460800

; ═══════════════════════════════════════════════════════════════
; BUILD FLAGS
; ═══════════════════════════════════════════════════════════════
build_flags = 
    -DCORE_DEBUG_LEVEL=3
    -std=gnu++17
    -Wall
    -Wextra

; ═══════════════════════════════════════════════════════════════
; REQUIRED LIBRARIES FOR CYD + OTA ANIMATION
; ═══════════════════════════════════════════════════════════════
lib_deps = 
    ; Display driver for CYD (ILI9341)
    bodmer/TFT_eSPI @ ^2.5.0
    
    ; WiFi and OTA
    ;(built-in to Arduino framework)
    
    ; JSON parsing (for I2C telemetry)
    bblanchon/ArduinoJson @ ^6.21.0
    
    ; Sensor libraries (optional, if using real sensors)
    adafruit/DHT sensor library @ ^1.4.4
    adafruit/Adafruit SHT31 @ ^2.0.0
    adafruit/Adafruit ADS1X15 @ ^2.4.0
    
    ; TinyGPS++ for GPS module (optional)
    mikalhart/TinyGPS++ @ ^1.0.3

; ═══════════════════════════════════════════════════════════════
; TFT_eSPI CUSTOM SETUP (Very Important!)
; This tells TFT_eSPI which display driver to use
; ═══════════════════════════════════════════════════════════════
lib_extra_dirs = 
    lib/

; Create lib/TFT_eSPI/User_Setup.h with CYD-specific pins
; OR use this build flag to override:
build_flags = 
    ${env:esp32-cyd.build_flags}
    -D USER_SETUP_LOADED
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_MOSI=13
    -D TFT_MISO=12
    -D TFT_SCLK=14
    -D TFT_RST=-1
    -D TFT_BL=21
    -D TFT_BACKLIGHT_ON=1
    -D ILI9341_DRIVER
    -D LOAD_GLCD
    -D LOAD_FONT2
    -D LOAD_FONT4
    -D LOAD_FONT6
    -D LOAD_FONT7
    -D LOAD_FONT8

; ═══════════════════════════════════════════════════════════════
; OPTIONAL: OTA UPLOAD (WiFi firmware update)
; ═══════════════════════════════════════════════════════════════
; Uncomment if you have ArduinoOTA configured:
; upload_protocol = espota
; upload_port = 192.168.x.x  (replace with your CYD IP)
; upload_flags = 
;     --auth=your_password

; ═══════════════════════════════════════════════════════════════
; DEBUGGING & OPTIMIZATION
; ═══════════════════════════════════════════════════════════════
debug_tool = esp-prog
debug_init_break = tbreak setup

; Optimize for size vs speed (uncomment one)
; -O0 = no optimization (debug)
; -O2 = balanced
; -O3 = fast (larger binary)
build_flags = 
    ${env:esp32-cyd.build_flags}
    -O2

; ═══════════════════════════════════════════════════════════════
; SERIAL MONITOR FILTER (decode ESP32 crash dumps)
; ═══════════════════════════════════════════════════════════════
monitor_filters = 
    esp32_exception_decoder
    time
